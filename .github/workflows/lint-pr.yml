name: Lint Branch & Commits
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(feature|fix|build|chore)\/[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "❌ Branch '$BRANCH' must match feature/* or fix/* or build/* or chore/*"
            exit 1
          fi
          echo "✅ Branch name valid: $BRANCH"

  commit-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          FAIL=0
          while read -r msg; do
            if [[ ! "$msg" =~ ^(feat|fix|docs|build|style|refactor|test|chore|ci):\ .+ ]]; then
              echo "❌ Invalid commit message: $msg"
              FAIL=1
            fi
          done < <(git log --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          exit $FAIL
