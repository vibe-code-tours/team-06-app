name: ci
# Progressive CI for team projects. Safe on any stack: every step is guarded, so a
# fresh repo stays GREEN until you add the matching script/deps — then the check
# starts enforcing. No wall of red on day one.
#
# Enforcement is controlled by BRANCH PROTECTION, not this file:
#   ch-6  -> check runs, NOT required (advisory)
#   ch-8  -> mark the `ci` check "required" in the ruleset (blocks merge on red)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Kill superseded runs on the same branch/PR (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest # never windows/macos — they bill 2x / 10x
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # ---------- Node / TypeScript (runs only if package.json exists) ----------
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install (Node)
        if: ${{ hashFiles('package.json') != '' }}
        # npm ci is reproducible but needs a lockfile; fall back to npm install so a
        # first-push repo without package-lock.json still goes green.
        run: npm ci || npm install
      - name: Lint
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint --if-present
      - name: Typecheck
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run typecheck --if-present

      # ---------- Local Supabase (Docker) for RLS/integration tests ----------
      # tests/db/** and tests/rls/** hit a real Postgres/Auth instance via
      # tests/helpers/supabaseTestClient.ts — no mocks. `supabase start` runs
      # migrations automatically on boot, matching local dev (`npm run db:start`).
      - name: Start Supabase (local)
        if: ${{ hashFiles('supabase/config.toml') != '' }}
        run: npx supabase start --workdir .

      - name: Write supabase/.env.test (local instance)
        if: ${{ hashFiles('supabase/config.toml') != '' }}
        run: |
          STATUS=$(npx supabase status -o json)
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r .API_URL)"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$STATUS" | jq -r .ANON_KEY)"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r .SERVICE_ROLE_KEY)"
          } > supabase/.env.test

      # ---------- Next.js Dev Server for Integration Tests ----------
      - name: Copy env to apps/web
        if: ${{ hashFiles('supabase/.env.test') != '' }}
        run: cp supabase/.env.test apps/web/.env.local

      - name: Build shared package
        if: ${{ hashFiles('packages/shared/package.json') != '' }}
        run: npm run build --workspace=packages/shared

      - name: Start Next.js dev server
        if: ${{ hashFiles('apps/web/package.json') != '' }}
        run: |
          cd apps/web
          npm run dev &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Next.js dev server ready"
              break
            fi
            echo "Waiting for Next.js... ($i/30)"
            sleep 2
          done

      - name: Test
        if: ${{ hashFiles('package.json') != '' }}
        env:
          TEST_APP_URL: http://localhost:3000
        run: npm test --if-present

      - name: Stop Next.js dev server
        if: ${{ always() && hashFiles('apps/web/package.json') != '' }}
        run: pkill -f "next dev" || true

      - name: Stop Supabase (local)
        if: ${{ always() && hashFiles('supabase/config.toml') != '' }}
        run: npx supabase stop --no-backup

      - name: Build
        if: ${{ hashFiles('package.json') != '' }}
        # Dashboard pages construct a Supabase client at module load, so `next build`
        # needs *some* well-formed URL/key to prerender — it doesn't need to actually
        # connect. Placeholders only; real values are injected at deploy time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build --if-present
