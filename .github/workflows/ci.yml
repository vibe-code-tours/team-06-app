name: ci
# Progressive CI for team projects. Safe on any stack: every step is guarded, so a
# fresh repo stays GREEN until you add the matching script/deps — then the check
# starts enforcing. No wall of red on day one.
#
# Enforcement is controlled by BRANCH PROTECTION, not this file:
#   ch-6  -> check runs, NOT required (advisory)
#   ch-8  -> mark the `ci` check "required" in the ruleset (blocks merge on red)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Kill superseded runs on the same branch/PR (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest # never windows/macos — they bill 2x / 10x
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # ---------- Node / TypeScript (runs only if package.json exists) ----------
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install (Node)
        if: ${{ hashFiles('package.json') != '' }}
        # npm ci is reproducible but needs a lockfile; fall back to npm install so a
        # first-push repo without package-lock.json still goes green.
        run: npm ci || npm install
      - name: Lint
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint --if-present
      - name: Typecheck
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run typecheck --if-present
      - name: Test
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      # ---------- Supabase connectivity (advisory placeholder) ----------
      # tests/rls/** and tests/helpers/** need a real Supabase instance + supabase/.env.test
      # to actually run — neither exists yet while we're scaffolding. This step is a
      # stand-in: it's a no-op until .env.test shows up, and even then only reports
      # reachability without gating the build. Replace with `supabase start` + migrate
      # once we're ready to run RLS/integration tests for real in CI.
      - name: Supabase connectivity check (placeholder)
        if: ${{ hashFiles('supabase/.env.test') != '' }}
        continue-on-error: true
        run: |
          set -a
          source supabase/.env.test
          set +a
          curl -sf "${NEXT_PUBLIC_SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            && echo "✅ Supabase reachable" \
            || echo "⚠️  Supabase unreachable (advisory only, not blocking)"

      - name: Build
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present
